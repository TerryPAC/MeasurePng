# Triggered on a version tag (v1.0.0, v1.2.3, …).
# Publishes the npm package AND deploys the GitHub Pages site in one release.
#
# Setup required:
#   1. Add Trusted Publisher on npmjs.com (Settings → Trusted Publishers)
#      - Workflow: publish.yml
#   2. GitHub Pages must be enabled in repository Settings → Pages,
#      with source set to "GitHub Actions".

name: Publish & Deploy

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Publish npm package ──────────────────────────────────────────────────────
  npm-publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node 24 ships with npm 11.x which is required for Trusted Publisher / OIDC
      # (Trusted Publisher requires npm >= 11.5.1 and Node >= 22.14.0)
      # registry-url is required: setup-node generates .npmrc so npm knows where to publish
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Debug Info
        run: |
          node -v
          npm -v

      - name: Update version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Updating version to $VERSION"
          npm version $VERSION --no-git-tag-version

      - run: npm ci

      - name: Publish to npm via OIDC (Trusted Publisher)
        run: npm publish

      - name: Commit and push version update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: update version to ${GITHUB_REF#refs/tags/v} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main

  # ── Deploy GitHub Pages ──────────────────────────────────────────────────────
  pages-deploy:
    name: GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
